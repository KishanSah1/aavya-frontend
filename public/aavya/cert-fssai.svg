<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420" font-family="Georgia, serif">
  <!-- Paper background -->
  <rect width="600" height="420" fill="#FFFEF5"/>

  <!-- Outer decorative border -->
  <rect x="10" y="10" width="580" height="400" fill="none" stroke="#1a3a5c" stroke-width="3"/>
  <rect x="16" y="16" width="568" height="388" fill="none" stroke="#1a3a5c" stroke-width="1"/>
  <rect x="20" y="20" width="560" height="380" fill="none" stroke="#c8a84b" stroke-width="1.5"/>

  <!-- Corner ornaments -->
  <g fill="#1a3a5c">
    <rect x="10" y="10" width="30" height="4"/>
    <rect x="10" y="10" width="4" height="30"/>
    <rect x="560" y="10" width="30" height="4"/>
    <rect x="586" y="10" width="4" height="30"/>
    <rect x="10" y="406" width="30" height="4"/>
    <rect x="10" y="380" width="4" height="30"/>
    <rect x="560" y="406" width="30" height="4"/>
    <rect x="586" y="380" width="4" height="30"/>
  </g>

  <!-- Header band -->
  <rect x="20" y="20" width="560" height="70" fill="#0d2137"/>

  <!-- Emblem circle in header -->
  <circle cx="60" cy="55" r="24" fill="none" stroke="#c8a84b" stroke-width="1.5"/>
  <circle cx="60" cy="55" r="18" fill="#c8a84b" fill-opacity="0.15"/>
  <text x="60" y="52" text-anchor="middle" font-size="10" fill="#c8a84b" font-weight="bold">FSSAI</text>
  <text x="60" y="63" text-anchor="middle" font-size="7" fill="#c8a84b">INDIA</text>

  <!-- Header text -->
  <text x="300" y="43" text-anchor="middle" font-size="9" fill="#c8a84b" letter-spacing="3" font-family="Arial, sans-serif">FOOD SAFETY AND STANDARDS AUTHORITY OF INDIA</text>
  <text x="300" y="58" text-anchor="middle" font-size="16" fill="white" font-weight="bold" letter-spacing="1">Certificate of Registration</text>
  <text x="300" y="74" text-anchor="middle" font-size="8" fill="#aac4dd" letter-spacing="2" font-family="Arial, sans-serif">MINISTRY OF HEALTH &amp; FAMILY WELFARE, GOVT. OF INDIA</text>

  <!-- Watermark -->
  <text x="300" y="260" text-anchor="middle" font-size="80" fill="#0d2137" fill-opacity="0.04" font-weight="bold" transform="rotate(-20, 300, 260)">FSSAI</text>

  <!-- Certificate body -->
  <text x="300" y="120" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">This is to certify that the food business operator</text>

  <text x="300" y="148" text-anchor="middle" font-size="22" fill="#0d2137" font-weight="bold">Aavya Foods Pvt. Ltd.</text>
  <line x1="160" y1="155" x2="440" y2="155" stroke="#c8a84b" stroke-width="1"/>

  <text x="300" y="176" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">Village Bharoli Kalan, Distt. Kangra, Himachal Pradesh – 176001</text>
  <text x="300" y="194" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">is hereby licensed to carry on the food business of</text>

  <text x="300" y="216" text-anchor="middle" font-size="11" fill="#0d2137" font-weight="bold" font-family="Arial, sans-serif">Manufacturing &amp; Sale of Ghee and Dairy Products</text>

  <!-- Details box -->
  <rect x="80" y="232" width="440" height="80" fill="#f0f4f8" rx="4"/>
  <line x1="300" y1="232" x2="300" y2="312" stroke="#ccc" stroke-width="1"/>
  <line x1="80" y1="272" x2="520" y2="272" stroke="#ccc" stroke-width="1"/>

  <text x="130" y="249" text-anchor="middle" font-size="8" fill="#888" font-family="Arial, sans-serif">LICENSE NUMBER</text>
  <text x="130" y="264" text-anchor="middle" font-size="11" fill="#0d2137" font-weight="bold" font-family="Arial, sans-serif">24220244000879</text>

  <text x="400" y="249" text-anchor="middle" font-size="8" fill="#888" font-family="Arial, sans-serif">CATEGORY</text>
  <text x="400" y="264" text-anchor="middle" font-size="11" fill="#0d2137" font-weight="bold" font-family="Arial, sans-serif">Central License</text>

  <text x="130" y="289" text-anchor="middle" font-size="8" fill="#888" font-family="Arial, sans-serif">DATE OF ISSUE</text>
  <text x="130" y="304" text-anchor="middle" font-size="11" fill="#0d2137" font-weight="bold" font-family="Arial, sans-serif">15 March 2024</text>

  <text x="400" y="289" text-anchor="middle" font-size="8" fill="#888" font-family="Arial, sans-serif">VALID UNTIL</text>
  <text x="400" y="304" text-anchor="middle" font-size="11" fill="#0d2137" font-weight="bold" font-family="Arial, sans-serif">14 March 2026</text>

  <!-- Signature section -->
  <line x1="100" y1="365" x2="220" y2="365" stroke="#999" stroke-width="1"/>
  <text x="160" y="375" text-anchor="middle" font-size="8" fill="#777" font-family="Arial, sans-serif">Designated Officer</text>
  <text x="160" y="385" text-anchor="middle" font-size="7" fill="#999" font-family="Arial, sans-serif">FSSAI, Central Licensing Authority</text>

  <!-- Seal -->
  <circle cx="300" cy="362" r="26" fill="none" stroke="#0d2137" stroke-width="1.5"/>
  <circle cx="300" cy="362" r="20" fill="#0d2137" fill-opacity="0.06"/>
  <circle cx="300" cy="362" r="14" fill="none" stroke="#0d2137" stroke-width="0.8"/>
  <text x="300" y="358" text-anchor="middle" font-size="7" fill="#0d2137" font-weight="bold">FSSAI</text>
  <text x="300" y="368" text-anchor="middle" font-size="5" fill="#0d2137">INDIA</text>

  <line x1="380" y1="365" x2="500" y2="365" stroke="#999" stroke-width="1"/>
  <text x="440" y="375" text-anchor="middle" font-size="8" fill="#777" font-family="Arial, sans-serif">Commissioner Food Safety</text>
  <text x="440" y="385" text-anchor="middle" font-size="7" fill="#999" font-family="Arial, sans-serif">Himachal Pradesh</text>

  <!-- Bottom note -->
  <text x="300" y="402" text-anchor="middle" font-size="7" fill="#aaa" font-family="Arial, sans-serif">This certificate is issued under Section 31 of FSS Act, 2006 and is subject to compliance with all applicable regulations.</text>
</svg>
